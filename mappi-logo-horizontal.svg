<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for nodes -->
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for paths -->
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="150" fill="white"/>

  <!-- P-Shape Icon -->
  <g transform="translate(30, 15)" filter="url(#glow)">
    <!-- Lines -->
    <line x1="15" y1="15" x2="55" y2="15" stroke="url(#pathGradient)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 55 15 Q 75 15 75 35 Q 75 55 55 55" fill="none" stroke="url(#pathGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="55" x2="55" y2="55" stroke="url(#pathGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="15" y2="110" stroke="url(#pathGradient)" stroke-width="3" stroke-linecap="round"/>

    <!-- Nodes -->
    <circle cx="15" cy="15" r="8" fill="url(#nodeGradient)"/>
    <circle cx="15" cy="15" r="3" fill="white"/>

    <circle cx="55" cy="15" r="8" fill="url(#nodeGradient)"/>
    <circle cx="55" cy="15" r="3" fill="white"/>

    <circle cx="75" cy="35" r="8" fill="url(#nodeGradient)"/>
    <circle cx="75" cy="35" r="3" fill="white"/>

    <circle cx="55" cy="55" r="8" fill="url(#nodeGradient)"/>
    <circle cx="55" cy="55" r="3" fill="white"/>

    <circle cx="15" cy="55" r="8" fill="url(#nodeGradient)"/>
    <circle cx="15" cy="55" r="3" fill="white"/>

    <circle cx="15" cy="82" r="8" fill="url(#nodeGradient)"/>
    <circle cx="15" cy="82" r="3" fill="white"/>

    <circle cx="15" cy="110" r="10" fill="#2563EB"/>
    <circle cx="15" cy="110" r="5" fill="#60A5FA"/>
    <circle cx="15" cy="110" r="2" fill="white"/>
  </g>

  <!-- MAPPI Text -->
  <text x="160" y="85" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#1E40AF">
    MAPPI
  </text>

  <!-- Separator -->
  <line x1="340" y1="40" x2="340" y2="110" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Hebrew + Tagline -->
  <text x="370" y="70" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#3B82F6">
    מאפי
  </text>
  <text x="370" y="100" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748B" letter-spacing="2">
    MAPPING
  </text>
</svg>
