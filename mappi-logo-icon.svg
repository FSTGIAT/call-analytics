<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for nodes -->
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for paths -->
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#EFF6FF"/>
  <circle cx="100" cy="100" r="90" fill="white"/>

  <!-- P-Shape Journey Path -->
  <g transform="translate(50, 25)" filter="url(#glow)">
    <!-- Horizontal top line -->
    <line x1="20" y1="25" x2="75" y2="25" stroke="url(#pathGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Right curve -->
    <path d="M 75 25 Q 100 25 100 50 Q 100 75 75 75" fill="none" stroke="url(#pathGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Horizontal middle line -->
    <line x1="20" y1="75" x2="75" y2="75" stroke="url(#pathGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Vertical stem -->
    <line x1="20" y1="25" x2="20" y2="140" stroke="url(#pathGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Nodes -->
    <circle cx="20" cy="25" r="10" fill="url(#nodeGradient)"/>
    <circle cx="20" cy="25" r="4" fill="white"/>

    <circle cx="75" cy="25" r="10" fill="url(#nodeGradient)"/>
    <circle cx="75" cy="25" r="4" fill="white"/>

    <circle cx="100" cy="50" r="10" fill="url(#nodeGradient)"/>
    <circle cx="100" cy="50" r="4" fill="white"/>

    <circle cx="75" cy="75" r="10" fill="url(#nodeGradient)"/>
    <circle cx="75" cy="75" r="4" fill="white"/>

    <circle cx="20" cy="75" r="10" fill="url(#nodeGradient)"/>
    <circle cx="20" cy="75" r="4" fill="white"/>

    <circle cx="20" cy="110" r="10" fill="url(#nodeGradient)"/>
    <circle cx="20" cy="110" r="4" fill="white"/>

    <!-- Bottom insight node -->
    <circle cx="20" cy="140" r="12" fill="#2563EB"/>
    <circle cx="20" cy="140" r="6" fill="#60A5FA"/>
    <circle cx="20" cy="140" r="3" fill="white"/>
  </g>
</svg>
