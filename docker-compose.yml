services:
  # Node.js API Server
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: call-analytics-api
    env_file:
      - ./config/.env.api
      - ./config/.env.oracle
      - ./config/.env.sqs
      # - .env.aws  # Temporarily disabled to prevent AWS token issues
    environment:
      - AUTO_MIGRATE=true
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS_HOST=redis
      # Temporarily commented out AWS credentials to force local Oracle config
      # - AWS_REGION=eu-west-1
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_SESSION_
      # Minimal Oracle config for local development (overridden by AWS Secrets in production)
      - ORACLE_USER=system
      - ORACLE_PASSWORD=2288
      - ORACLE_HOST=oracle
      - ORACLE_PORT=1521
      - ORACLE_SERVICE_NAME=XE
      # Temporarily disable AWS Secrets Manager while debugging authentication
      - USE_AWS_SECRETS=false
      - DISABLE_AWS_SECRETS=true
      - OPENSEARCH_BATCH_SIZE=1         # Index immediately, don't wait for batch
      - OPENSEARCH_BATCH_TIMEOUT=5000   # 5 second timeout instead of 30
      # UTF-8 encoding for Hebrew support
      - LC_ALL=C.UTF-8
      - LANG=C.UTF-8
      - NLS_LANG=AMERICAN_AMERICA.AL32UTF8
      # CDC Performance Optimization (optimized for faster processing)
      - CDC_POLL_INTERVAL_MS=10000      # Check every 10 seconds for balanced performance
      - CDC_BATCH_SIZE=5                # Process 5 calls at once for smaller batches
      # SQS Configuration (replaces Kafka)
      - ENABLE_SQS=true
      - SQS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/811287567672/Myque1
      - AWS_REGION=eu-west-1
      - CDC_MAX_CONCURRENT=10           # Process 10 calls concurrently instead of 3
      # Enable SQS CDC (replaces Kafka CDC)
      - ENABLE_SQS_CDC=true
    ports:
      - "3000:3000"
    volumes:
      # - ./api:/app  # Commented out for production - uncomment for development
      # - /app/node_modules  # Commented out for production
      - ./logs/api:/app/logs
      - ./config/call-classifications.json:/app/config/call-classifications.json:ro
      - ~/.aws:/root/.aws:ro  # Mount AWS credentials directory
    depends_on:
      - oracle
      - redis
      - opensearch
    networks:
      - call-analytics-network
    restart: unless-stopped

  # Flask ML Service - Enhanced with optimized resource management and GPU
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: call-analytics-ml
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # Performance optimizations (enhanced for Hebrew LLM)
      - MODEL_TEMPERATURE=0.2
      - MODEL_MAX_TOKENS=800
      - REQUEST_TIMEOUT=120
      - OLLAMA_TIMEOUT=90
      - DEFAULT_MODEL=dictalm2.0-instruct:Q4_K_M
      - HEBREW_MODEL=dictalm2.0-instruct:Q4_K_M
      # CUDA optimizations for GPU acceleration
      - CUDA_VISIBLE_DEVICES=0
      - CUDA_LAUNCH_BLOCKING=0
      - CUDA_CACHE_DISABLE=0
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_MEMORY_FRACTION=0.8
      # GPU memory management
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - OMP_NUM_THREADS=4
      # Cache optimizations
      - ENABLE_INFERENCE_CACHE=true
      - INFERENCE_CACHE_SIZE=500
      - INFERENCE_CACHE_TTL=1800
      # SQS Configuration (replaces Kafka)
      - ENABLE_SQS=true
      - SQS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/811287567672/Myque1
      - AWS_REGION=eu-west-1
    env_file:
      - ./config/.env.ml
      - .env.models
    ports:
      - "5000:5000"
    volumes:
      - ./ml-service:/app
      - ./data/models:/app/models
      - ./data/sentence-transformers:/root/.cache/torch/sentence_transformers
      - ./data/huggingface:/root/.cache/huggingface
      - ./logs/ml:/app/logs
      - ./config/call-classifications.json:/app/config/call-classifications.json:ro
      - ./config/prompt-templates.json:/app/config/prompt-templates.json:ro
    deploy:
      resources:
        limits:
          memory: 12G  # Increased for Hebrew LLM processing
          cpus: '8.0'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 6G
    networks:
      - call-analytics-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 45s
      timeout: 15s
      retries: 3
      start_period: 120s

  # Vue.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: call-analytics-frontend
    env_file:
      - ./config/.env.frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - call-analytics-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: call-analytics-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./data/cache:/data
    networks:
      - call-analytics-network
    restart: unless-stopped

  # OpenSearch for Hebrew text search
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: call-analytics-opensearch
    environment:
      - cluster.name=call-analytics-opensearch
      - node.name=call-analytics-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx3g"
      - plugins.security.disabled=true
    env_file:
      - ./config/.env.search
    deploy:
      resources:
        limits:
          memory: 4G
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - opensearch_logs:/usr/share/opensearch/logs
      - ./config/opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - ./config/opensearch/index-templates.json:/usr/share/opensearch/config/index-templates.json:ro
    networks:
      - call-analytics-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Oracle Database
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: call-analytics-oracle
    environment:
      - ORACLE_PWD=2288
      - ORACLE_CHARACTERSET=AL32UTF8
      - ORACLE_EDITION=xe
    ports:
      - "1521:1521"
      - "5500:5500"  # Oracle Enterprise Manager Express
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle/init:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - call-analytics-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlplus", "-S", "sys/2288@localhost:1521/XE as sysdba", "@/opt/oracle/scripts/health-check.sql"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # OpenSearch Dashboards (optional)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: call-analytics-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - call-analytics-network
    profiles:
      - dashboards

  # Ollama for local LLM (DictaLM 2.0 for Hebrew/English processing) - GPU Optimized
  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    container_name: call-analytics-ollama
    runtime: nvidia
    env_file:
      - .env.models
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
      - ./ollama:/models  # Mount entire ollama directory including scripts
      - ./ollama/init-models.sh:/scripts/init-models.sh:ro
      - ./ollama/download-dictalm.py:/scripts/download-dictalm.py:ro
      - ./ollama/health-check.sh:/scripts/health-check.sh:ro
      # - ./ollama/Modelfile.dictalm:/scripts/Modelfile.dictalm:ro  # Mount issue - will copy manually
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_MODELS=/root/.ollama/models
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}  # HuggingFace token for automated model downloads
      # GPU Performance optimizations (enhanced for DictaLM 2.0)
      - OLLAMA_GPU_MEMORY_FRACTION=0.75
      - OLLAMA_NUM_GPU_LAYERS=-1  # Use all GPU layers for maximum GPU utilization
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=10m    # Reduced to free GPU memory faster
      - OLLAMA_MAX_LOADED_MODELS=1  # Single model for better performance
      - OLLAMA_NUM_PARALLEL=2      # Increased for better throughput
      - OLLAMA_NUM_BATCH=1024      # Increased batch size for GPU efficiency
      - OLLAMA_NUM_THREADS=6       # Optimized for GPU workloads
      # CUDA optimizations (enhanced for GPU acceleration)
      - CUDA_VISIBLE_DEVICES=0
      - CUDA_LAUNCH_BLOCKING=0
      - CUDA_CACHE_DISABLE=0
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - CUDA_MEMORY_POOL_DISABLE=0
      # Memory management for GPU
      - OLLAMA_MAX_VRAM=0          # Let Ollama manage GPU memory automatically
      - OLLAMA_LOW_VRAM=false      # We have sufficient VRAM
      # Additional performance tuning
      - OLLAMA_DEBUG=0             # Disable debug for production performance
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 20G     # Increased for GPU model loading and Hebrew processing
          cpus: '6.0'     # Increased CPU allocation
    ulimits:
      nproc: 2000         # Increased process limit
      nofile: 65536       # File descriptor limit
    networks:
      - call-analytics-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "/scripts/health-check.sh"]
      interval: 60s
      timeout: 45s
      retries: 3
      start_period: 240s  # Extended for DictaLM model loading on GPU

networks:
  call-analytics-network:
    driver: bridge

volumes:
  oracle_data:
  redis_data:
  opensearch_data:
  opensearch_logs:
  ollama_models: